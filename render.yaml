services:
  - type: web
    name: ai-summarizer-provider-architecture
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: LLM_PROVIDER
        value: openai
      - key: SUMMARY_PROVIDER
        value: openai
      - key: CHAT_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
